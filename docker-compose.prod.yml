name: masar-prod

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
    volumes:
      - masar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-false}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL}
      PLATFORM_TIMEZONE: ${PLATFORM_TIMEZONE:-Asia/Amman}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_CLEANUP_INTERVAL_SECONDS: ${RATE_LIMIT_CLEANUP_INTERVAL_SECONDS:-60}
      RATE_LIMIT_MAX_KEYS: ${RATE_LIMIT_MAX_KEYS:-20000}
      LOGIN_RATE_LIMIT: ${LOGIN_RATE_LIMIT:-5/minute}
      REGISTER_RATE_LIMIT: ${REGISTER_RATE_LIMIT:-3/minute}
      PASSWORD_CHANGE_RATE_LIMIT: ${PASSWORD_CHANGE_RATE_LIMIT:-5/hour}
      PASSWORD_RESET_RATE_LIMIT: ${PASSWORD_RESET_RATE_LIMIT:-3/hour}
      PASSWORD_RESET_CONFIRM_RATE_LIMIT: ${PASSWORD_RESET_CONFIRM_RATE_LIMIT:-5/hour}
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRE_MINUTES:-30}
      CONTACT_RATE_LIMIT: ${CONTACT_RATE_LIMIT:-3/minute}
      BOOKING_RATE_LIMIT: ${BOOKING_RATE_LIMIT:-10/minute}
      BOOKING_CANCELLATION_CUTOFF_HOURS: ${BOOKING_CANCELLATION_CUTOFF_HOURS:-6}
      REQUIRE_PAYMENT_BEFORE_CONFIRMATION: ${REQUIRE_PAYMENT_BEFORE_CONFIRMATION:-true}
      PAYMENT_REFERENCE_REQUIRED: ${PAYMENT_REFERENCE_REQUIRED:-true}
      MAIL_ENABLED: ${MAIL_ENABLED:?Set MAIL_ENABLED}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL:-no-reply@masar.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Masar}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:?Set BACKEND_CORS_ORIGINS}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-Masar Admin}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5

  proxy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    profiles:
      - https
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy

volumes:
  masar_postgres_data:
  caddy_data:
  caddy_config:
